name: Generate Stats Images

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone github-stats and install deps
        run: |
          git clone https://github.com/jstrieb/github-stats.git /tmp/github-stats
          pip install --upgrade pip setuptools
          pip install -r /tmp/github-stats/requirements.txt

      - name: Generate images
        working-directory: /tmp/github-stats
        run: python generate_images.py
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXCLUDED: ""
          EXCLUDED_LANGS: ""
          EXCLUDE_FORKED_REPOS: "true"

      - name: Copy generated files
        run: cp -r /tmp/github-stats/generated/ generated/

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add generated/
          git commit -m "Update generated stats" || exit 0
          git push
